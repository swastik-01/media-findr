name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry (Optional - if using ACR)
        # uses: azure/docker-login@v1
        # with:
        #   login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
        #   username: ${{ secrets.REGISTRY_USERNAME }}
        #   password: ${{ secrets.REGISTRY_PASSWORD }}
        run: echo "Skipping login if deploying directly via Zip/Git or if using Public Registry"

      - name: Build and Push Docker Image
        run: |
          docker build \
            --build-arg VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }} \
            --build-arg VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID }} \
            --build-arg VITE_COGNITO_DOMAIN=${{ secrets.VITE_COGNITO_DOMAIN }} \
            --build-arg VITE_AWS_REGION=${{ secrets.VITE_AWS_REGION }} \
            -t media-findr:latest .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'media-findr'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          # images: '${{ secrets.REGISTRY_LOGIN_SERVER }}/media-findr:${{ github.sha }}'
