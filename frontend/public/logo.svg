<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="url(#grad1)"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Camera Body -->
    <rect x="128" y="160" width="256" height="192" rx="32" fill="white" fill-opacity="0.9"/>
    <rect x="208" y="128" width="96" height="32" rx="8" fill="white" fill-opacity="0.9"/>
    <!-- Lens -->
    <circle cx="256" cy="256" r="64" fill="url(#grad1)"/>
    <circle cx="256" cy="256" r="48" fill="white" fill-opacity="0.3"/>
    <!-- Search Handle -->
    <path d="M304 304 L352 352" stroke="white" stroke-width="24" stroke-linecap="round"/>
  </g>
</svg>
